name: 'Gemini Dispatch (disabled, non-authoritative)'

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual advisory note. This workflow is disabled for Corvus validation.'
        required: true
        type: 'string'

# Corvus validation authority is PMT local validation evidence plus CStar
# validation/result ids and CStar Console witness receipts/status.
#
# This workflow used to run automatically on issues, PRs, reviews, and comments,
# then dispatch google-github-actions/run-gemini-cli@v0 through reusable Gemini
# workflows such as gemini-triage.yml. That made GitHub Actions look like a
# validation path for Corvus workflow issues/PRs. The CEO-approved non-Actions
# workflow keeps GitHub as the issue/branch/PR/review ledger only; Actions are
# optional and non-blocking unless a repo separately opts into them.

jobs:
  disabled:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
    steps:
      - name: 'Report disabled advisory workflow'
        run: |-
          printf '%s\n' 'Gemini Dispatch is disabled for Corvus validation.'
          printf '%s\n' 'Use PMT local validation evidence, CStar result ids, and CStar Console witness receipts/status.'
          printf '%s\n' 'GitHub Actions failures are advisory/non-blocking unless separately opted in.'
